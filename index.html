<!DOCTYPE html>
<html>

<head>
	<title>RelaxChat</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css?v=20">
</head>

<body>

	<div id="lockScreen" class="lockScreen">
		<div class="lockCard">
			<div class="lockLogo">RC</div>
			<h1>RelaxChat</h1>
			<p>Enter password to join</p>

			<input id="passwordInput" type="password" placeholder="Password">
			<button id="unlockBtn">Enter Chat</button>

			<div id="lockError" class="lockError"></div>
		</div>
	</div>

	<div class="app" id="app" style="display: none;">

		<aside class="brandPanel">
			<div class="logoBubble">RC</div>
		</aside>

		<main class="chatPanel">

			<header class="chatHeader">
				<div class="chatInfo">
					<label for="chatNameInput">Chat name</label>
					<input id="chatNameInput" placeholder="RelaxChat">
					<p id="chatStatus">Connecting...</p>
				</div>

				<button id="clearBtn" class="clearBtn">Clear</button>
			</header>

			<section id="messages" class="messages">
				<div class="welcomeMessage">
					<h2>RelaxChat</h2>
					<p>Connecting to your server...</p>
				</div>
			</section>

			<footer class="messageBar">
				<input id="displayNameInput" placeholder="Your name">

				<div class="sendRow">
					<input id="messageInput" placeholder="Type a message...">
					<button id="sendBtn">Send</button>
				</div>
			</footer>

		</main>

	</div>

	<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
	<script src="script.js?v=20"></script>
</body>

</html>
